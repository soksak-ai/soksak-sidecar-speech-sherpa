[package]
name = "soksak-sidecar-speech-sherpa"
version = "0.0.1"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
base64 = "0.22.1"
ndarray = "0.17"
ort = "2.0.0-rc.7"
rand = "0.8"
rand_distr = "0.4"
rayon = "1.12.0"
regex = "1.12.4"
rustfft = "6.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sherpa-rs-sys = { version = "0.6.8", features = ["tts", "download-binaries"] }
unicode-normalization = "0.1.25"
