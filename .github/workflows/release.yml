# 릴리즈 — main 에서 수동 dispatch 시 다섯 플랫폼 타깃마다 사이드카 dist 아카이브를 빌드해
# owner-immutable GitHub Release 자산으로 올린다. 각 타깃은 그 타깃의 네이티브 러너에서 빌드하므로
# 크로스 링커가 필요 없다. dist 스테이징은 stage.sh 단일 진실(바이너리 + sherpa-onnx/onnxruntime 1.17.1).
#
# ort(Supertonic 엔진)의 onnxruntime: 타깃마다 그 타깃이 받을 수 있는 가장 새 버전을 쓴다(Cargo.toml
# per-target api-N 과 정합). ort 2.0.0-rc.12 바인딩 상한이 api-24 라 현대 4타깃 = onnxruntime 1.27.1,
# Intel Mac 은 osx-x86_64 프리빌드가 있는 마지막인 1.23.2. ort 는 load-dynamic 이라 pyke CDN 프리빌드에
# 기대지 않고, 이 워크플로우가 Microsoft 공식 onnxruntime 을 타깃별 버전으로 받아 dist 에 동봉한다
# (libonnxruntime-ort.*). 런타임에 main.rs 가 ORT_DYLIB_PATH 로 가리킨다. sherpa 는 자체 1.17.1 을
# 링크한다 — 두 self-contained onnxruntime 은 표준(dyld 이단계 네임스페이스 격리).
name: release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      # onnxruntime 버전은 타깃마다 그 타깃이 받을 수 있는 가장 새 것 — 현대 4타깃은 ort 상한인 1.27.1,
      # Intel Mac 은 osx-x86_64 프리빌드가 있는 마지막인 1.23.2. Cargo.toml 의 per-target api-N 과 정합.
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            onnx: onnxruntime-osx-arm64-1.27.1.tgz
            onnx_ver: "1.27.1"
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            onnx: onnxruntime-osx-x86_64-1.23.2.tgz
            onnx_ver: "1.23.2"
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            onnx: onnxruntime-linux-aarch64-1.27.1.tgz
            onnx_ver: "1.27.1"
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            onnx: onnxruntime-linux-x64-1.27.1.tgz
            onnx_ver: "1.27.1"
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            onnx: onnxruntime-win-x64-1.27.1.zip
            onnx_ver: "1.27.1"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - id: identity
        shell: bash
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          case "$ver" in ''|*[!0-9.]*) echo "invalid version: $ver" >&2; exit 1;; esac
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Build the release binary for this target
        run: cargo build --locked --release
      - name: Stage the dist for this OS
        shell: bash
        run: ./stage.sh dist
      - name: Bundle the ort ONNX Runtime (Microsoft, newest this target can take)
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/microsoft/onnxruntime/releases/download/v${{ matrix.onnx_ver }}/${{ matrix.onnx }}"
          echo "fetch $url"
          curl -fsSL "$url" -o ort-onnx.archive
          mkdir -p ort-onnx
          case "${{ matrix.onnx }}" in
            *.zip) unzip -q ort-onnx.archive -d ort-onnx ;;
            *)     tar -xzf ort-onnx.archive -C ort-onnx ;;
          esac
          case "$(uname -s)" in
            MINGW* | MSYS* | CYGWIN*)
              main="$(find ort-onnx -name 'onnxruntime.dll' -type f | head -1)"
              cp "$main" dist/onnxruntime-ort.dll
              find ort-onnx -name 'onnxruntime_providers_*.dll' -type f -exec cp {} dist/ \; 2>/dev/null || true
              test -f dist/onnxruntime-ort.dll ;;
            Linux)
              main="$(find ort-onnx -name 'libonnxruntime.so*' -type f | head -1)"
              cp "$main" dist/libonnxruntime-ort.so
              find ort-onnx -name 'libonnxruntime_providers_*.so*' -type f -exec cp {} dist/ \; 2>/dev/null || true
              test -f dist/libonnxruntime-ort.so ;;
            Darwin)
              main="$(find ort-onnx -name 'libonnxruntime.*.dylib' -type f | head -1)"
              cp "$main" dist/libonnxruntime-ort.dylib
              find ort-onnx -name 'libonnxruntime_providers_*.dylib' -type f -exec cp {} dist/ \; 2>/dev/null || true
              test -f dist/libonnxruntime-ort.dylib ;;
          esac
          echo "== dist ==" && ls -la dist
      - id: archive
        shell: bash
        run: |
          ver="${{ steps.identity.outputs.version }}"
          out="soksak-sidecar-speech-sherpa-$ver-${{ matrix.target }}.tar.gz"
          # stage.sh 는 실파일만 복사하고 onnxruntime 도 실파일 — 심링크 없어 어느 OS 든 평범한 tar 로 자족적이다.
          tar -czf "$out" -C dist .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$out" | tee "$out.sha256"
          else
            shasum -a 256 "$out" | tee "$out.sha256"
          fi
          echo "asset=$out" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-${{ matrix.target }}
          path: |
            ${{ steps.archive.outputs.asset }}
            ${{ steps.archive.outputs.asset }}.sha256
          if-no-files-found: error
          compression-level: 0

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - id: identity
        run: |
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          case "$ver" in ''|*[!0-9.]*) echo "invalid version: $ver" >&2; exit 1;; esac
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Create least-privilege release token
        id: release-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.SOKSAK_RELEASE_CLIENT_ID }}
          private-key: ${{ secrets.SOKSAK_RELEASE_PRIVATE_KEY }}
          permission-administration: read
          permission-contents: write
      - name: Publish through owner-enforced immutable releases
        env:
          GH_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          enforced="$(gh api "repos/${{ github.repository }}/immutable-releases" --jq '.enabled and .enforced_by_owner')"
          test "$enforced" = "true" || { echo "owner-enforced immutable releases must be enabled before tagging" >&2; exit 1; }
          tag="${{ steps.identity.outputs.tag }}"
          assets="$(find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) | sort)"
          test "$(printf '%s\n' "$assets" | grep -c '\.tar\.gz$')" -eq 5 || { echo "expected 5 platform archives, got:" >&2; echo "$assets" >&2; exit 1; }
          gh release create "$tag" --repo "${{ github.repository }}" --target "${{ github.sha }}" --title "$tag" --generate-notes $assets
